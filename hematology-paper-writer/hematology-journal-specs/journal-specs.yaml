# Hematology Journal Specifications
# Comprehensive formatting and submission guidelines for major hematology journals

journals:
  Blood:
    full_name: "Blood"
    publisher: "American Society of Hematology"
    impact_factor: ~25
    manuscript_formatting:
      font: "Times New Roman"
      font_size: 12
      line_spacing: "double"
      margins: 1  # inch
      line_numbering: true
    word_limit: 4500
    abstract:
      limit: 250
      keywords_limit: 5
    reference_style: "Vancouver"
    required_sections:
      - title_page
      - abstract
      - key_points
      - introduction
      - methods
      - results
      - discussion
      - acknowledgments
      - references
      - tables
      - figures
    key_points:
      required: true
      bullet_count: 3-5
    specific_requirements:
      safety_reporting: true
      trial_registration: true  # required for clinical trials
      author_contributions: true
      conflict_of_interest: true
      supplementary_materials: true
    email_format: "correspondingauthor@institution.edu"
    submission_url: "https://submit.bloodjournal.org"
    notes: |
      Premier hematology journal. Strict adherence to reporting guidelines required.
      Adverse events must be reported in detail for clinical studies.

  Blood_Advances:
    full_name: "Blood Advances"
    publisher: "American Society of Hematology"
    impact_factor: ~7
    manuscript_formatting:
      font: "Times New Roman"
      font_size: 12
      line_spacing: "double"
      margins: 1
      line_numbering: true
    word_limit: 4500
    abstract:
      limit: 250
      keywords_limit: 5
    reference_style: "Vancouver"
    required_sections:
      - title_page
      - abstract
      - key_points
      - introduction
      - methods
      - results
      - discussion
      - acknowledgments
      - references
      - tables
      - figures
    key_points:
      required: true
      bullet_count: 3-5
    specific_requirements:
      online_only: true
      figure_limit: "unlimited"
      page_charges: false
      open_access: true  # hybrid model
      safety_reporting: true
      trial_registration: true
      author_contributions: true
      conflict_of_interest: true
    email_format: "correspondingauthor@institution.edu"
    submission_url: "https://submit.bloodadvances.org"
    notes: |
      Open-access companion journal to Blood. More accessible but still rigorous.
      All articles available free online. No page charges.

  JCO:
    full_name: "Journal of Clinical Oncology"
    publisher: "American Society of Clinical Oncology"
    impact_factor: ~45
    manuscript_formatting:
      font: "Times New Roman"
      font_size: 12
      line_spacing: "double"
      margins: 1
      line_numbering: true
    word_limit: 4000
    abstract:
      limit: 250
      keywords_limit: 5
    reference_style: "Vancouver"
    required_sections:
      - title_page
      - abstract
      - introduction
      - methods
      - results
      - discussion
      - acknowledgments
      - author_contributions
      - references
      - tables
      - figures
      - CONSORT_diagram  # for clinical trials
    specific_requirements:
      statistical_reporting: "JCO guidelines"
      CONSORT: true  # required for clinical trials
      clinical_trial_registry: true
      author_contributions: true
      conflict_of_interest: true
    email_format: "correspondingauthor@institution.edu"
    submission_url: "https://jco.msubmit.net"
    notes: |
      Highest impact oncology journal. Extremely rigorous statistical standards.
      Clinical trials require CONSORT diagram and trial registration.
      Rapid publication for significant clinical findings.

  Blood_Research:
    full_name: "Blood Research"
    publisher: "Springer Nature (on behalf of Korean Society of Hematology)"
    impact_factor: ~2.8
    access: "Gold Open Access (APC covered by Korean Society of Hematology)"
    manuscript_formatting:
      font: "Times New Roman"
      font_size: 12
      line_spacing: "double"
      line_numbering: true
    article_types:
      original_article:
        word_limit: 3500
        abstract:
          limit: 250
          style: "Structured (Purpose, Methods, Results, Conclusion)"
        reference_limit: 30
        figures_tables: "No hard cap; standard parsimony applies"
      review_article:
        word_limit: 5000
        abstract:
          limit: 250
          style: "Unstructured"
        reference_limit: 150
    abstract:
      limit: 250
      keywords_min: 4
      keywords_max: 6
    reference_style: "Vancouver (numbered in square brackets [1])"
    doi_required: true
    required_sections:
      - title_page
      - abstract
      - introduction
      - materials_and_methods
      - results
      - discussion
      - acknowledgments
      - references
      - tables
      - figure_legends
      - figures
    mandatory_declarations:
      - competing_interests
      - funding_information
      - ethical_approval
      - informed_consent
      - author_contributions  # CRediT encouraged
      - data_availability_statement
    figure_formats:
      preferred: ["EPS", "TIFF"]
      acceptable: ["MS Office"]
      resolution_line_art: "1200 dpi"
      resolution_halftone: "300 dpi"
      color_model: "RGB 8-bit"
      color_charges: false
    specific_requirements:
      orcid: true  # required for corresponding author
      ai_disclosure: true  # LLM use must be documented in Methods
      trial_registration: true
      data_sharing_policy: "Type 3 (data available upon reasonable request)"
    submission_url: "https://submission.springernature.com/new-submission/44313/3"
    journal_home: "https://www.bloodresearch.or.kr/"
    notes: |
      Official journal of the Korean Society of Hematology.
      Fully open access with APC covered by the Society — no author cost.
      Strong focus on translational hematology research; review articles
      should emphasize translational impact in a 'Review Highlights' summary.

  British_Journal_of_Haematology:
    full_name: "British Journal of Haematology"
    publisher: "British Society for Haematology"
    impact_factor: ~8
    manuscript_formatting:
      font: "Times New Roman"  # or "Arial"
      font_size: 11
      line_spacing: "double"
      margins: 1
      line_numbering: false
    word_limit: 5000
    abstract:
      limit: 200
      keywords_limit: 5
    reference_style: "Vancouver"
    units: "SI units required"
    gene_nomenclature: "HGVS format"
    required_sections:
      - title_page
      - abstract
      - introduction
      - methods
      - results
      - discussion
      - acknowledgments
      - references
      - tables
      - figures
    specific_requirements:
      SI_units: true  # mandatory
      gene_nomenclature: "HGVS/ISCN"
      statistics: "BASHH guidelines"
      conflict_of_interest: true
      author_contributions: true
    email_format: "correspondingauthor@institution.edu"
    submission_url: "https://mc.manuscriptcentral.com/bjh"
    notes: |
      UK-based hematology journal. Strict SI unit requirements.
      Gene nomenclature must follow HGVS/ISCN standards.
      Statistics should follow BASHH guidelines.

  Haematologica:
    full_name: "Haematologica"
    publisher: "Ferrata Storti Foundation / European Hematology Association (EHA)"
    impact_factor: ~8.2
    access: "Gold Open Access"
    language: "American English"
    article_types:
      original_article:
        word_limit: 4000
        abstract:
          limit: 250
          style: "Unstructured"
        reference_limit: 50
        figures_tables_limit: 8
        methods_limit: "500 words in main text (detailed methods to Supplementary)"
        required_sections:
          - title_page
          - abstract
          - introduction
          - methods
          - results
          - discussion
          - data_availability_statement
          - references
      review_article:
        word_limit: 5000
        abstract:
          limit: 250
          style: "Unstructured"
        reference_limit: 100
        author_limit: 3
        required_sections:
          - title_page
          - abstract
          - introduction
          - body_text
          - references
      letter_to_editor:
        word_limit: 1500
        reference_limit: 15
        figures_tables_limit: 3
    reference_style: "Vancouver/NLM (ICMJE)"
    reference_format:
      citation_style: "Numbered superscript"
      authors: "List all if ≤6; first 3 + 'et al.' if >6"
      journal_abbreviations: "MEDLINE style"
    gene_nomenclature:
      genes: "Italic + All Capitals (e.g., ABL1)"
      proteins: "Roman + All Capitals (e.g., ABL1)"
      drug_names: "Generic names only"
    specific_requirements:
      trial_registration: true
      orcid: true
      ai_disclosure: true
      preprints: "Allowed (BioRxiv/MedRxiv); must be disclosed in cover letter"
      supplementary_data: "Merged into single PDF (max 30MB)"
      reporting_guidelines:
        clinical_trials: "CONSORT"
        observational: "STROBE"
        meta_analyses: "PRISMA"
    fees:
      submission_fee: "€70 (non-refundable for uninvited papers)"
      apc: "~€2,500 for original articles (check current rates)"
    submission_url: "https://haematologica.org/submitandtrack"
    notes: |
      Gold open access; EHA official journal. Sentence-style titles required
      (title must describe the main finding). Methods section capped at 500 words
      in main text — move detailed methods to Supplementary Data.
      Authorship for review articles typically limited to 3 authors.

  Leukemia:
    full_name: "Leukemia"
    publisher: "Springer Nature"
    impact_factor: ~12.8
    notes: |
      Pending: guidelines to be added once lookup completes.

# Reference formatting templates
reference_templates:
  vancouver:
    journal_article: "{authors}. {title}. {journal} {year};{volume}:{pages}."
    book: "{authors}. {title}. {city}: {publisher}; {year}."
    chapter: "{authors}. {title}. In: {editor}, ed. {book_title}. {city}: {publisher}; {year}:{pages}."
    online: "{authors}. {title}. {journal} {year};{volume}:{pages}. DOI:{doi}"

# General compliance check items
compliance_checklist:
  - title_present
  - abstract_present
  - keywords_present
  - references_formatted
  - tables_labeled
  - figures_labeled
  - author_contributions
  - conflict_of_interest
  - funding_acknowledged
  - trial_registered  # if applicable
  - word_count_ok
  - abstract_length_ok

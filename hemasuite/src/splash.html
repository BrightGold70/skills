<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HemaSuite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }
    .container { text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: 0.05em; }
    .subtitle { color: #94a3b8; font-size: 1.1rem; margin-top: 0.5rem; }
    .spinner {
      margin: 2rem auto 0;
      width: 2rem; height: 2rem;
      border: 3px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { color: #64748b; font-size: 0.85rem; margin-top: 1rem; }
    .credit { color: #475569; font-size: 0.75rem; margin-top: 2rem; letter-spacing: 0.02em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>HemaSuite</h1>
    <p class="subtitle">Clinical Research Suite</p>
    <div class="spinner"></div>
    <p class="status">Starting up...</p>
    <p class="credit">Developed by Hawk Kim, M.D., Ph.D.</p>
  </div>
</body>
</html>
